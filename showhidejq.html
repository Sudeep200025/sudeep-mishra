<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jQuery Show / Hide Example</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    max-width:600px;
    margin:auto;
}

.box{
    background:#0d6efd;
    padding:40px;
    margin-top:20px;
    border-radius:10px;
    font-size:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.show{background:#28a745;color:white;}
.hide{background:#dc3545;color:white;}
.toggle{background:#ffc107;color:black;}
</style>
</head>

<body>

<div class="container">


<button class="show">Show</button>
<button class="hide">Hide</button>
<button class="toggle">Toggle</button>

<div class="box">
This box will Show and Hide using jQuery
</div>

</div>

<script>

$(document).ready(function(){

    $(".show").click(function(){
        $(".box").show(500);
    });

    $(".hide").click(function(){
        $(".box").hide(500);
    });

    $(".toggle").click(function(){
        $(".box").toggle(500);
    });

});

</script>

</body>
</html>
