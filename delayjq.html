<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jQuery Delay Method Example</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
}

.box{
    width:150px;
    height:150px;
    background:#0d6efd;
    margin:30px auto;
    border-radius:10px;
}

button{
    padding:10px 25px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#28a745;
    color:white;
    cursor:pointer;
}

code{
    background:#222;
    padding:4px 6px;
    border-radius:4px;
}
</style>
</head>

<body>

<div class="container">



<div class="box"></div>

<button id="start">Start Animation</button>

<p>Click the button to see how delay works.</p>

</div>

<script>

$(document).ready(function(){

$("#start").click(function(){

$(".box")
.slideUp(1000)
.delay(1000)
.slideDown(1000)
.delay(1000)
.fadeOut(1000)
.delay(1000)
.fadeIn(1000);

});

});

</script>

</body>
</html>
